specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Bloomberg Products and Platforms
providerId: bloomberg-products-and-platforms
created: '2026-05-04'
modified: '2026-05-04'
tags:
  - Products
  - Platforms
  - Terminal
  - Enterprise
  - Financial Data
  - Analytics
  - Bloomberg
description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: bloomberg-products-and-platforms-free
    name: Free
    type: freemium
    description: Free entry tier for the Bloomberg Products and Platforms API surface. Intended for evaluation,
      prototyping, and low-volume integrations. Real limits and pricing must be reconciled with the provider's
      published plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - blpapi://localhost:8194
          - blpapi://bpipe-server:8194
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the free tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        domains:
          - blpapi://localhost:8194
          - blpapi://bpipe-server:8194
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Public Documentation
      - name: Community Support
      - name: Sandbox Access
      - name: Bloomberg Open API (BLPAPI)
      - name: Bloomberg B-PIPE
      - name: Bloomberg EMSX (Electronic Order Management)
  - id: bloomberg-products-and-platforms-pro
    name: Professional
    type: paid
    description: Production tier for Bloomberg Products and Platforms. Provides higher quotas, priority
      support, and access to the broader API portfolio. Pricing placeholder; align with the provider's
      pricing page.
    entries:
      - label: API Requests
        description: Monthly API request quota
        name: api_requests
        type: quota
        metric: requests
        limit: 100000
        timeFrame: month
        geo: global
        domains:
          - blpapi://localhost:8194
          - blpapi://bpipe-server:8194
        unit: 1
        price: TBD
        userMultiplied: false
      - label: Rate Limit
        description: Maximum requests per minute on the professional tier
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 100
        timeFrame: minute
        geo: global
        domains:
          - blpapi://localhost:8194
          - blpapi://bpipe-server:8194
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Overage
        description: Per-request price after monthly quota is exceeded
        name: overage
        type: metered
        metric: requests
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - blpapi://localhost:8194
          - blpapi://bpipe-server:8194
        unit: 1000
        price: TBD
        userMultiplied: false
    elements:
      - name: All Production Endpoints
      - name: Email Support
      - name: SLA Targets
      - name: Webhook Subscriptions
      - name: Bloomberg Open API (BLPAPI)
      - name: Bloomberg B-PIPE
      - name: Bloomberg EMSX (Electronic Order Management)
  - id: bloomberg-products-and-platforms-enterprise
    name: Enterprise
    type: enterprise
    description: Custom-negotiated tier for Bloomberg Products and Platforms. Includes dedicated capacity,
      contractual SLAs, security review, data residency options, and named technical account management.
    entries:
      - label: API Requests
        description: Negotiated request volume; -1 indicates uncapped subject to fair use
        name: api_requests
        type: quota
        metric: requests
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - blpapi://localhost:8194
          - blpapi://bpipe-server:8194
        unit: 1
        price: custom
        userMultiplied: false
      - label: Rate Limit
        description: Negotiated burst and steady-state rate
        name: rate_limit
        type: rate
        metric: requests_per_minute
        limit: 1000
        timeFrame: minute
        geo: configurable
        domains:
          - blpapi://localhost:8194
          - blpapi://bpipe-server:8194
        unit: 1
        price: custom
        userMultiplied: false
    elements:
      - name: Unlimited / Negotiated Volume
      - name: 24/7 Dedicated Support
      - name: Contractual SLA
      - name: Security & Compliance Review
      - name: Dedicated Account Manager
      - name: Custom Data Residency
      - name: Bloomberg Open API (BLPAPI)
      - name: Bloomberg B-PIPE
      - name: Bloomberg EMSX (Electronic Order Management)
